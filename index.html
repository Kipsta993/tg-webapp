<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple Draw</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background: var(--tg-theme-bg-color, #ffffff);
            touch-action: none;
            overflow: hidden;
        }

        #canvas {
            border: 2px solid #000;
            background: white;
            touch-action: none;
            width: 100%;
            max-width: 600px;
            height: 400px;
            margin: 0 auto;
            display: block;
        }

        .buttons {
            margin: 10px auto;
            text-align: center;
            max-width: 600px;
        }

        button {
            width: 40px;
            height: 40px;
            margin: 5px;
            border: none;
            border-radius: 5px;
        }

        .clear {
            width: auto;
            padding: 0 20px;
            background: red;
            color: white;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="buttons">
        <button style="background: black" onclick="setColor('black')"></button>
        <button style="background: red" onclick="setColor('red')"></button>
        <button style="background: blue" onclick="setColor('blue')"></button>
        <button style="background: green" onclick="setColor('green')"></button>
        <button class="clear" onclick="clearCanvas()">Очистить</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let currentColor = 'black';

        // Устанавливаем размер canvas
        function setCanvasSize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        setCanvasSize();
        window.onresize = setCanvasSize;

        // Функции рисования
        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isDrawing) return;

            let x, y;
            if (e.type.includes('touch')) {
                x = e.touches[0].clientX - canvas.offsetLeft;
                y = e.touches[0].clientY - canvas.offsetTop;
            } else {
                x = e.offsetX;
                y = e.offsetY;
            }

            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = currentColor;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Обработчики событий
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        // Вспомогательные функции
        function setColor(color) {
            currentColor = color;
            ctx.beginPath();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Предотвращаем скролл при рисовании
        document.body.addEventListener('touchmove', function(e) {
            if (e.target === canvas) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
