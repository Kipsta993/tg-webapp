<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Draw</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 16px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: Arial, sans-serif;
            touch-action: none;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        #canvas {
            border: 2px solid var(--tg-theme-button-color, #3390ec);
            border-radius: 12px;
            background: white;
            margin: 10px 0;
            touch-action: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .size-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 8px;
            background: var(--tg-theme-button-color, #3390ec);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .clear-btn {
            height: 44px;
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            background: #FF6B6B;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>
        
        <div class="controls">
            <!-- Предустановленные цвета -->
            <button class="color-btn" style="background: #000000" onclick="setColor('#000000')"></button>
            <button class="color-btn" style="background: #FF0000" onclick="setColor('#FF0000')"></button>
            <button class="color-btn" style="background: #00FF00" onclick="setColor('#00FF00')"></button>
            <button class="color-btn" style="background: #0000FF" onclick="setColor('#0000FF')"></button>
            <button class="color-btn" style="background: #FFFF00" onclick="setColor('#FFFF00')"></button>
            
            <!-- Размер кисти -->
            <button class="size-btn" onclick="setSize(5)">S</button>
            <button class="size-btn" onclick="setSize(15)">M</button>
            <button class="size-btn" onclick="setSize(30)">L</button>
            
            <!-- Очистка -->
            <button class="clear-btn" onclick="clearCanvas()">Очистить</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentColor = '#000000';
        let currentSize = 5;

        // Установка размера холста
        function resizeCanvas() {
            const container = canvas.parentElement;
            const width = Math.min(container.clientWidth - 32, 800);
            canvas.width = width;
            canvas.height = width * 0.8;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Функции рисования
        function draw(e) {
            if (!isDrawing) return;

            let x, y;
            if (e.type === 'mousemove') {
                x = e.offsetX;
                y = e.offsetY;
            } else if (e.type === 'touchmove') {
                const rect = canvas.getBoundingClientRect();
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
                e.preventDefault();
            }

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.stroke();

            [lastX, lastY] = [x, y];
        }

        function startDrawing(e) {
            isDrawing = true;
            if (e.type === 'mousedown') {
                [lastX, lastY] = [e.offsetX, e.offsetY];
            } else if (e.type === 'touchstart') {
                const rect = canvas.getBoundingClientRect();
                [lastX, lastY] = [
                    e.touches[0].clientX - rect.left,
                    e.touches[0].clientY - rect.top
                ];
                e.preventDefault();
            }
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Обработчики событий
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        // Вспомогательные функции
        function setColor(color) {
            currentColor = color;
        }

        function setSize(size) {
            currentSize = size;
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
