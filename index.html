<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="handheldfriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Манга</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="search-container">
        <div class="search-box">
            <input type="text" class="search-input" placeholder="Поиск манги...">
            <button class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </div>
    
    <div class="manga-grid">
        <div class="manga-card">
            <img src="Blue Lock.jpg" alt="BlueLock">
            <div class="manga-info">
                <h3>Blue Lock</h3>
                <p>Жанр: Спорт, Драма</p>
            </div>
        </div>
        
        <div class="manga-card">
            <img src="Blue Lock.jpg" alt="BlueLock">
            <div class="manga-info">
                <h3>Blue Lock: Episode Nagi</h3>
                <p>Жанр: Спорт, Драма</p>
            </div>
        </div>
        
        <div class="manga-card">
            <img src="Blue Lock.jpg" alt="BlueLock">
            <div class="manga-info">
                <h3>Blue Lock: Nagi Story</h3>
                <p>Жанр: Спорт, Психология</p>
            </div>
        </div>
        
        <div class="manga-card">
            <img src="Blue Lock.jpg" alt="BlueLock">
            <div class="manga-info">
                <h3>Blue Lock: Extra Time</h3>
                <p>Жанр: Спорт, Сёнен</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
