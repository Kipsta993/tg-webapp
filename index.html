<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="handheldfriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Манга</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="filter-container">
        <button class="filter-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M7 12h10M11 18h2"/>
            </svg>
        </button>
    </div>

    <div class="manga-grid">
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Episode Nagi</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Nagi Story</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Extra Time</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Origins</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Team Z</h3>
        </div>
    </div>
    
    <div class="filter-screen">
        <div class="filter-header">
            <button class="close-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Поиск манги...">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>

        <div class="filter-content">
            <h3>Жанры</h3>
            <div class="genre-tags">
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ мужчина</span>
                </label>
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ женщина</span>
                </label>
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ имба</span>
                </label>
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ бог</span>
                </label>
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ не человек</span>
                </label>
            </div>
            <button class="reset-btn">Сбросить фильтры</button>
        </div>
    </div>
    
    <div class="overlay"></div>
    
    <script src="script.js"></script>
</body>
</html>
