<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="handheldfriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Манга</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="filter-container">
        <button class="filter-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </button>
    </div>

    <div class="manga-grid">
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Episode Nagi</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Nagi Story</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Extra Time</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Origins</h3>
        </div>
        
        <div class="manga-card">
            <div class="manga-image">
                <span class="manga-type">Манга</span>
                <img src="Blue Lock.jpg" alt="BlueLock">
            </div>
            <h3>Blue Lock: Team Z</h3>
        </div>
    </div>
    
    <div class="no-results" style="display: none;">
        <svg class="broken-search" xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke-width="1.5">
            <!-- Тень от осколков -->
            <path d="M17.5 8L18.5 7M18.8 9.5L20 9M18.5 11.2L19.8 11.8" 
                  stroke="currentColor" stroke-width="0.5" opacity="0.15" filter="blur(2px)" transform="translate(0.5, 0.5)"/>
            
            <!-- Основное кольцо (с эффектом глубины) -->
            <path d="M11 4.5C13.5 4.5 15.7 6 16.5 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M11 4.5C13.5 4.5 15.7 6 16.5 8" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.3" transform="translate(-0.5, -0.5)"/>
            
            <path d="M16.5 11C16.5 13.7 14.7 16 11.5 16.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16.5 11C16.5 13.7 14.7 16 11.5 16.4" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.3" transform="translate(-0.5, -0.5)"/>
            
            <path d="M11 16.5C7.5 16.5 4.5 13.5 4.5 10C4.5 6.5 7.5 3.5 11 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M11 16.5C7.5 16.5 4.5 13.5 4.5 10C4.5 6.5 7.5 3.5 11 3.5" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.3" transform="translate(-0.5, -0.5)"/>
            
            <!-- Осколки с эффектом свечения -->
            <path d="M17.5 8L18.5 7M18.8 9.5L20 9M18.5 11.2L19.8 11.8" 
                  stroke="currentColor" stroke-linecap="round" opacity="0.8"/>
            <path d="M17.5 8L18.5 7M18.8 9.5L20 9M18.5 11.2L19.8 11.8" 
                  stroke="white" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>
            
            <!-- Рукоятка с тенью -->
            <path d="M15.5 15.5L19.5 19.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M15.5 15.5L19.5 19.5" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.3" transform="translate(-0.5, -0.5)"/>
            
            <!-- Внутренние декоративные линии -->
            <path d="M7.5 7.8C8.3 7 9.6 6.5 11 6.5" stroke="currentColor" stroke-linecap="round" opacity="0.2"/>
            <path d="M6.8 10.5C6.8 11.9 7.3 13.2 8.1 14" stroke="currentColor" stroke-linecap="round" opacity="0.2"/>
            
            <!-- Блики с градиентом -->
            <linearGradient id="blickGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:white;stop-opacity:0.5"/>
                <stop offset="100%" style="stop-color:white;stop-opacity:0.1"/>
            </linearGradient>
            <path d="M8 8.5Q9 7.5 10.5 7.8" stroke="url(#blickGradient)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M7 10Q7.5 9.5 8.2 9.7" stroke="url(#blickGradient)" stroke-width="0.8" stroke-linecap="round"/>
            
            <!-- Эффект разбитого стекла -->
            <path d="M16.5 8.5L17 8.2M17.2 10.5L17.5 10.2" 
                  stroke="white" stroke-width="0.5" opacity="0.6" stroke-linecap="round"/>
        </svg>
        <p>Манга не найдена</p>
    </div>
    
    <div class="filter-screen">
        <div class="filter-header">
            <div class="filter-header-top">
                <h2>Фильтр</h2>
                <button class="reset-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                        <path d="M21 3v5h-5"/>
                    </svg>
                    Сбросить
                </button>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Поиск манги...">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>

        <div class="filter-content">
            <h3>Жанры</h3>
            <div class="genre-tags">
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ мужчина</span>
                </label>
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ женщина</span>
                </label>
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ имба</span>
                </label>
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ бог</span>
                </label>
                <label class="genre-tag">
                    <input type="checkbox" hidden>
                    <span>ГГ не человек</span>
                </label>
            </div>
        </div>

        <button class="close-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
        </button>
    </div>
    
    <div class="overlay"></div>
    
    <script src="script.js"></script>
</body>
</html>
